# git-cliff configuration — https://git-cliff.org/docs/configuration
#
# The repo is versioned as ONE (a single tag line across all bundles); a
# bundle's changelog is scoped per invocation via `--include-path`, not by
# a separate config per bundle. See Taskfile.yml's `changelog` task.

[changelog]
header = """
# Changelog\n
All notable changes to this project will be documented in this file.
"""
body = """
{% if version -%}
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## [Unreleased]
{% endif -%}
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group }}
    {% for commit in commits %}
        - {{ commit.message | split(pat="\n") | first | trim }}\
    {% endfor %}
{% endfor %}\n
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
commit_parsers = [
    { message = "^feat", group = "Added" },
    { message = "^fix", group = "Fixed" },
    { message = "^docs", group = "Documentation" },
    { message = "^refactor", group = "Changed" },
    { message = "^perf", group = "Changed" },
    { message = "^chore", group = "Chores" },
    { message = "^test", group = "Tests" },
    { message = ".*", group = "Other" },
]
filter_commits = false
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "oldest"

[bump]
initial_tag = "v0.1.0"           # first release when no tags exist yet
features_always_bump_minor = true
breaking_always_bump_major = false # stay pre-1.0 until intentional
