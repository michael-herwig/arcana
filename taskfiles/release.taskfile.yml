# yaml-language-server: $schema=https://taskfile.dev/schema.json
#
# Release preparation for arcana. Mirrors ../grimoire-vscode's
# release:prepare, adapted to grim: there is no version file to bump (bundles
# ref `:latest`, grimoire.toml carries no version) — the release version IS
# the git tag. git-cliff computes the next version from conventional commits
# and regenerates the changelogs (root + per-bundle) at that tag.

version: '3'

tasks:
  # Single source of truth for changelog generation. Root CHANGELOG.md spans
  # the whole repo; each bundle group (top-level dir with a <dir>/<dir>.toml
  # manifest) gets its own scoped one. Pass TAG=vX.Y.Z to cut a release
  # section; omit it for a rolling `Unreleased` section.
  changelog:
    desc: 'Regenerate CHANGELOG.md (root + per-bundle); TAG=vX.Y.Z tags a release, else Unreleased'
    cmds:
      - |
        tag_flag=""
        [ -n "{{.TAG}}" ] && tag_flag="--tag {{.TAG}}"
        git-cliff $tag_flag -o CHANGELOG.md
        for manifest in */*.toml; do
          dir="${manifest%%/*}"
          [ "$dir/$dir.toml" = "$manifest" ] || continue
          git-cliff $tag_flag --include-path "$dir/**" -o "$dir/CHANGELOG.md"
        done

  # Full release preparation: compute next version, regenerate the changelogs
  # tagged at it (via release:changelog), run the publish dry-run gate. After
  # this succeeds, the human reviews, commits, tags, and pushes.
  #
  # Version selection:
  #   task release:prepare                 # interactive menu: auto | patch | minor | major
  #   task release:prepare BUMP=minor      # skip the menu, force a bump level
  #   task release:prepare BUMP=auto VERSION=1.4.0   # pin an exact version (v prefix optional)
  #
  # BUMP is a required enum: with interactive mode on (.taskrc.yml) and a TTY it
  # renders a selection menu; on CI / no TTY it must be passed on the CLI.
  prepare:
    desc: 'Prepare a release (interactive: pick auto|patch|minor|major; or BUMP=<level> / VERSION=x.y.z)'
    requires:
      vars:
        - name: BUMP
          enum: [auto, patch, minor, major]
    vars:
      # git-cliff computes the next version from git history. `auto` lets it pick
      # the bump from conventional commits; otherwise BUMP forces the level.
      # VERSION pins an exact value and wins over BUMP.
      NEXT_VERSION:
        sh: |
          if [ -n "{{.VERSION}}" ]; then
            printf 'v%s' "{{.VERSION | default "" | trimPrefix "v"}}"
          elif [ "{{.BUMP}}" = "auto" ]; then
            git-cliff --bumped-version
          else
            git-cliff --bumped-version --bump "{{.BUMP}}"
          fi
    cmds:
      - echo "Next version:{{.NEXT_VERSION}}"
      - task: changelog
        vars: { TAG: '{{.NEXT_VERSION}}' }
      - task publish -- --dry-run
      - |
        echo ""
        echo "Release prepared ({{.NEXT_VERSION}}). Review changes, then:"
        echo "  git add -A && git commit -m 'release: {{.NEXT_VERSION}}'"
        echo "  git tag {{.NEXT_VERSION}}"
        echo "  git push --atomic origin main {{.NEXT_VERSION}}"
